# Netlify build + routing for RepoHive.
# - Vite builds the static frontend into dist/.
# - The Express API runs as a single Netlify Function (netlify/functions/api.ts),
#   wrapped with serverless-http.
# - /api/* is rewritten to that function. Everything else falls back to
#   index.html so client-side routes (React Router) work on direct hits.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
